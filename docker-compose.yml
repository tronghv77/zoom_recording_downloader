version: '3.8'

services:
  zoomdl:
    build: .
    container_name: zoomdl-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - zoomdl-data:/data
    environment:
      - PORT=3000
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-secret}
      - AGENT_SECRET=${AGENT_SECRET:-change-this-agent-secret}

volumes:
  zoomdl-data:
